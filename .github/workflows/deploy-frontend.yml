name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    # Don't waste a build if only docs/markdown changed.
    paths:
      - 'web/**'
      - 'package.json'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Allow only one concurrent deploy, queueing newer runs and skipping stale ones
concurrency:
  group: pages
  cancel-in-progress: false

# Required for `actions/deploy-pages` to grant the GITHUB_TOKEN the
# `pages: write` and `id-token: write` permissions.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build React bundle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        env:
          # Custom domain (e.g. conciliacion-geo.app) → set this in repo
          # Settings → Secrets → VITE_BASE=/.  Default keeps the path.
          VITE_BASE: ${{ vars.VITE_BASE || secrets.VITE_BASE || '/conciliacion-geo-v02/' }}
          VITE_API_URL: ${{ vars.VITE_API_URL || secrets.VITE_API_URL || 'https://conciliacion-api.onrender.com' }}
          # Observability (Phase 8) — leave unset to disable.
          # Both Sentry and the Plausible-style analytics beacon are
          # no-ops when their env vars are absent, so the bundle ships
          # zero observability code by default.
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN || secrets.VITE_SENTRY_DSN || '' }}
          VITE_ANALYTICS_URL: ${{ vars.VITE_ANALYTICS_URL || secrets.VITE_ANALYTICS_URL || '' }}
          VITE_RELEASE: ${{ github.sha }}
        run: npm run build

      - name: Copy SPA fallback
        # GH Pages won't serve index.html for unknown routes (e.g. /app).
        # A 404.html that mirrors index.html lets the client router take over.
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
