name: Build portable bundle

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            web/package-lock.json
            electron/package-lock.json

      - name: Install Python deps
        run: |
          pip install -r requirements-api.txt
          pip install pyinstaller

      - name: Build React
        working-directory: web
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: /api/v1
          VITE_BASE: /
          # Disable the PWA service worker for the Electron bundle: the
          # SW's NavigationRoute serves a cached index.html with stale
          # asset hashes, which breaks full-page reloads (e.g. the
          # "Nueva sesión" button) and leaves the UI empty.
          VITE_PWA: "false"

      - name: Build Python sidecar
        run: |
          pyinstaller --clean --noconfirm conciliacion-api.spec

      - name: Install Electron deps
        working-directory: electron
        run: npm ci

      - name: Build Electron app (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: electron
        run: npm run build:linux

      - name: Build Electron app (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: electron
        run: npm run build:windows

      - name: Package Windows artifact
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path dist-portable/win-unpacked/* `
            -DestinationPath conciliacion-portable-windows.zip

      - name: Rename Linux artifact for clarity
        if: matrix.os == 'ubuntu-latest'
        run: |
          mv dist-portable/*.AppImage conciliacion-portable-linux.AppImage

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: conciliacion-portable-windows
          path: conciliacion-portable-windows.zip

      - name: Upload Linux artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: conciliacion-portable-linux
          path: conciliacion-portable-linux.AppImage

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from electron/package.json
        id: version
        run: echo "version=$(jq -r .version electron/package.json)" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          name: conciliacion-portable-windows
          path: release-artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: conciliacion-portable-linux
          path: release-artifacts/

      - name: List artifacts
        run: ls -lh release-artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Conciliación Geotécnica v${{ steps.version.outputs.version }}
          body: |
            ## Portable bundle — Windows + Linux

            Descarga el archivo correspondiente a tu sistema operativo, descomprime y ejecuta. No requiere instalación ni permisos de administrador.

            ### Windows
            `conciliacion-portable-windows.zip`

            ### Linux
            `conciliacion-portable-linux.AppImage`

            > **Nota para Linux**: Ubuntu 24.04+ no incluye FUSE por defecto. Si el AppImage no se ejecuta directamente, extrae con `--appimage-extract` y ejecuta `./squashfs-root/conciliacion-electron`.

            ## Stack
            - **Backend**: Python 3.12, FastAPI, trimesh, scipy, PyInstaller
            - **Frontend**: React 19, TypeScript, Tailwind CSS, CesiumJS
            - **Shell**: Electron 32, electron-builder
            - **Formatos**: STL, OBJ, DXF, XLSX, DOCX
          files: release-artifacts/*
          fail_on_unmatched_files: true
