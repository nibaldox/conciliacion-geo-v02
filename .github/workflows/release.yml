name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libspatialindex-dev

      - name: Install Python deps + pyinstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .
          pip install -r requirements-api.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build web
        working-directory: web
        env:
          # Disable the PWA service worker for the Electron bundle.
          VITE_PWA: 'false'
          # The portable bundle serves the frontend from the root path.
          VITE_BASE: /
          VITE_API_URL: /api/v1
        run: |
          npm ci
          npm run build

      - name: Build sidecar
        run: pyinstaller --clean --noconfirm conciliacion-api.spec

      - name: Build Electron AppImage (Linux)
        working-directory: electron
        run: |
          npm ci
          npm run build:linux

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.get_version.outputs.VERSION }}
          draft: true
          generate_release_notes: true
          files: |
            electron/dist-portable/*.AppImage
            dist/conciliacion-api
