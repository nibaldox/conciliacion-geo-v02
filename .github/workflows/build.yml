name: build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libspatialindex-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          # pyinstaller is the only new dep for the sidecar build
          python -m pip install pyinstaller
          # Test runner + HTTP client used by the backend test suite
          python -m pip install pytest httpx
          # Sync the project deps
          pip install -e .
          pip install -r requirements-api.txt

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: web/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('web/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web deps + build
        working-directory: web
        env:
          # Disable the PWA service worker for the Electron bundle: the SW
          # serves a cached index.html with stale asset hashes, breaking
          # full-page reloads inside the AppImage.
          VITE_PWA: 'false'
          # The portable bundle serves the frontend from the root path.
          VITE_BASE: /
          VITE_API_URL: /api/v1
        run: |
          npm ci
          npm run build

      - name: Run backend tests
        run: |
          pytest tests/ -q --tb=short -x

      - name: Run electron unit tests
        working-directory: electron
        run: npm test

      - name: Build sidecar (PyInstaller)
        run: |
          pyinstaller --clean --noconfirm conciliacion-api.spec

      - name: Verify sidecar binary
        run: |
          ls -la dist/conciliacion-api
          file dist/conciliacion-api

      - name: Smoke test sidecar
        if: hashFiles('dist/conciliacion-api') != ''
        run: |
          # Start the sidecar in the background
          ./dist/conciliacion-api &
          SIDECAR_PID=$!
          # Wait for health
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:57890/api/v1/health; then
              echo "Sidecar healthy"
              break
            fi
            sleep 1
          done
          # Test the API
          curl -sf http://127.0.0.1:57890/api/v1/sections -o /dev/null -w "%{http_code}\n"
          # Kill
          kill $SIDECAR_PID
          wait $SIDECAR_PID 2>/dev/null || true

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: conciliacion-api-linux
          path: dist/conciliacion-api
          if-no-files-found: error

      - name: Build Electron AppImage
        working-directory: electron
        run: |
          npm ci
          npm run build:linux

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: conciliacion-portable-linux.AppImage
          path: electron/dist-portable/*.AppImage
          if-no-files-found: error
