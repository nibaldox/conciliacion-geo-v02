name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libspatialindex-dev
      
      - name: Install Python deps
        run: |
          pip install -r requirements-api.txt
          pip install -e .
      
      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short
      
      - name: Run pipeline test
        run: python test_pipeline.py

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      
      - name: Install deps
        working-directory: web
        run: npm ci
      
      - name: TypeScript check
        working-directory: web
        run: npx tsc --noEmit
      
      - name: Build
        working-directory: web
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Build API image
        run: docker build -f Dockerfile-api -t conciliacion-api:${{ github.sha }} .
      
      - name: Build Web image
        run: docker build -f Dockerfile-web -t conciliacion-web:${{ github.sha }} .
