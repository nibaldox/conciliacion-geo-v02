        "inLanguage": ["es", "en"]
      }
    </script>

    <!-- Cesium config MUST run before any cesium import -->
    <script>
      // Resolved against the configured Vite base path so it works in
      // both /conciliacion-geo-v02/ (default) and / (custom domain).
      (function () {
        var base = document.querySelector('base')?.href
          || (function () {
            var scripts = document.getElementsByTagName('script');
            var re = /^(.*?)\/assets\//;
            for (var i = 0; i < scripts.length; i++) {
              var m = scripts[i].src.match(re);
              if (m) return m[1] + '/';
            }
            return '/';
          })();
        window.CESIUM_BASE_URL = base + 'Cesium/';
      })();
    </script>
